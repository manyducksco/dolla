<!doctype html>

  <body>
    <div id="counter"></div>
    <script type="module">
      import { createRoot, state, html, $watch, $debug } from "../dist/index.js";

      function Counter() {
        const count = state(0);

        const debug = $debug();
        $watch(() => {
          debug.info("count", count.track());
        });

        return html`
          <p>Count: ${count}</p>
          <button onclick=${() => count.set(count.get() + 1)}>+1</button>
          <button onclick=${() => count.update((value) => value - 1)}>-1</button>
          <button onclick=${() => count.set(0)}>Reset</button>
        `;
      }

      createRoot("#counter").mount(Counter);
    </script>

    <div id="providers"></div>
    <script type="module">
      import { createRoot, state, html, $provide, $use, when } from "../dist/index.js";

      function Store() {
        return {
          value: state(0),
        };
      }

      function Parent() {
        const { value } = $provide(Store);

        value.set(10);

        return html`
          <div>
            <${Child} />
          </div>
        `;
      }

      function Child() {
        const { value } = $use(Store);

        return html` <p>${when(() => value.track() === 10, "We're good", "Something is off")}</p> `;
      }

      createRoot("#providers").mount(Parent);
    </script>

    <div
      id="chat-wire-demo"
      style="
        width: 400px;
        height: 600px;
        border: 1px solid #8ba3b5;
        border-radius: 8px;
        background: #e8ecef;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 40px;
      "
    ></div>

    <style>
      /* The dimensional bubble styling */
      .chat-bubble {
        margin: 8px 16px;
        padding: 12px 18px;
        background: linear-gradient(to bottom, #f2fcff, #d8ebf8);
        border: 1px solid #a3b8cb;
        border-radius: 16px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 2px 4px rgba(0, 0, 0, 0.15);
        font-family: sans-serif;
        color: #2c3e50;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      /* Skeuomorphic Sticky Header */
      .sticky-header {
        background: linear-gradient(to bottom, rgba(179, 198, 211, 0.85) 0%, rgba(144, 164, 180, 0.85) 100%);
        border-top: 1px solid rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid #73899b;
        border-radius: 16px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        padding: 4px 14px;
        font-family: sans-serif;
        font-size: 0.85em;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.3);
        margin: 0 auto;
        width: fit-content;
      }

      .animate-enter {
        animation: slideInAndBounce 400ms cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes slideInAndBounce {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.9);
        }
        70% {
          transform: translateY(-4px) scale(1.02);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>

    <script type="module">
      import { createRoot, VirtualList, state, html, when, watch } from "../dist/index.js";

      function ChatWireDemo() {
        // 1. Upgrade data to objects
        const items = state([
          { type: "header", text: "Today" },
          { type: "message", text: "Welcome to Chat/Wire!" },
          { type: "message", text: "Virtual list initialization complete." },
        ]);

        let counter = 1;

        function addMessage() {
          items.update((arr) => {
            const newArr = [...arr];

            // Auto-insert a new header every 5 messages to test the push effect
            if (counter % 5 === 0) {
              newArr.push({ type: "header", text: `Update Batch ${counter / 5}` });
            }

            newArr.push({
              type: "message",
              text: `Incoming message ${counter++} at ${new Date().toLocaleTimeString()}`,
            });

            return newArr;
          });
        }

        let i = 0;
        while (i < 200) {
          i++;
          addMessage();
        }

        setInterval(() => {
          addMessage();
        }, 5000);

        const isAtBottom = state(true);

        // Create a local variable to hold the API
        let listApi;

        return html`
          <div style="flex: 1; position: relative; display: flex; flex-direction: column; overflow-y: auto;">
            ${when(
              () => !isAtBottom.track(),
              html`<button
                onclick=${() => listApi?.scrollToBottom(true)}
                style="position: absolute; bottom: 16px; right: 16px; z-index: 20; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.9); border: 1px solid #a3b8cb; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; color: #2c3e50;"
              >
                ↓ Jump to Bottom
              </button>`,
            )}

            <${VirtualList}
              items=${items}
              bottomUp=${true}
              enterAnimationMs=${400}
              isSticky=${(item) => item.type === "header"}
              apiRef=${(api) => {
                listApi = api;

                // TODO: This is not good. Need a better way to get a reference to the controller and bind it to the view.
                watch(() => {
                  isAtBottom.set(api.isAtBottom.track());
                });
              }}
              renderSticky=${(itemSignal) => html`
                <div
                  style="padding: 12px 0; width: 100%; display: flex; justify-content: center; cursor: pointer;"
                  onclick=${() => listApi?.scrollToItem(itemSignal.track(), { smooth: true })}
                >
                  <div class="sticky-header">${() => itemSignal.track()?.text}</div>
                </div>
              `}
              render=${(itemSignal, indexSignal, context) => html`
                <div style="padding: 2px 0;">
                  ${() => {
                    const item = itemSignal.track();
                    if (!item) return null;

                    if (item.type === "header") {
                      return html`
                        <div
                          style="padding: 12px 0; display: flex; justify-content: center; cursor: pointer;"
                          onclick=${() => listApi?.scrollToItem(item, { smooth: true })}
                        >
                          <div class="sticky-header">${item.text}</div>
                        </div>
                      `;
                    }

                    return html`
                      <div class=${() => (context.isEntering.track() ? "chat-bubble animate-enter" : "chat-bubble")}>
                        ${item.text}
                      </div>
                    `;
                  }}
                </div>
              `}
            />
          </div>
        `;
      }

      createRoot("#chat-wire-demo").mount(ChatWireDemo);
    </script>
