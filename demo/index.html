<!doctype html>
<html>
  <head>
    <title>Dolla Demo</title>
  </head>
  <body>
    <div id="counter"></div>
    <script type="module">
      import { createRoot, state, html, $watch, $debug } from "../dist/index.js";

      function Counter() {
        const count = state(0);

        const debug = $debug();
        $watch(() => {
          debug.info("count", count.track());
        });

        return html`
          <p>Count: ${count}</p>
          <button onclick=${() => count.set(count.get() + 1)}>+1</button>
          <button onclick=${() => count.update((value) => value - 1)}>-1</button>
          <button onclick=${() => count.set(0)}>Reset</button>
        `;
      }

      createRoot("#counter").mount(Counter);
    </script>

    <div id="providers"></div>
    <script type="module">
      import { createRoot, state, html, $provide, $use, when } from "../dist/index.js";

      function Store() {
        return {
          value: state(0),
        };
      }

      function Parent() {
        const { value } = $provide(Store);

        value.set(10);

        return html`
          <div>
            <${Child} />
          </div>
        `;
      }

      function Child() {
        const { value } = $use(Store);

        return html` <p>${when(() => value.track() === 10, "We're good", "Something is off")}</p> `;
      }

      createRoot("#providers").mount(Parent);
    </script>

    <div id="virtual" style="border: 1px solid red; width: 300px; height: 500px"></div>
    <script type="module">
      import { createRoot, VirtualList, state, html } from "../dist/index.js";

      function List() {
        const _items = [];

        for (let i = 0; i < 10000; i++) {
          _items.push(20 + Math.random() * 100);
        }

        const items = state(_items);

        return html`
          <${VirtualList}
            items=${items}
            render=${(item, index) =>
              html`<div
                style=${{
                  height: item,
                  border: "1px dotted black",
                  width: "100%",
                }}
              >
                ${index}
              </div>`}
          />
        `;
      }

      createRoot("#virtual").mount(List);
    </script>
