    <div id="counter"></div>
    <script type="module">
      import { createRoot, state, html, $effect } from "../dist/index.js";

      function Counter() {
        const [count, setCount] = state(0);

        // What are all the tracking contexts?
        // - $effect() callback
        // - memo() callback
        // - any markup element attribute or child

        $effect(() => {
          console.log("count is", count());
        });

        return html`
          <p>Count: ${count}</p>
          <button onclick=${() => setCount((c) => c + 1)}>+1</button>
          <button onclick=${() => setCount((c) => c - 1)}>-1</button>
          <button onclick=${() => setCount(0)}>Reset</button>
        `;
      }

      createRoot("#counter").mount(Counter);

      // Footgun #1
      // function doComplexLogic() {
      //   // Define a function that calls a getter directly
      //   const value = count();
      // }
      // // Calling that function most of the time will just run the function once.
      // doComplexLogic();
      // // However...
      // $effect(() => {
      //   // Calling that function in this scope WILL track count.
      //   doComplexLogic();

      //   // You might have to defensively peek if you want to avoid this.
      //   // This makes you always have to be cognizant of tracking contexts.
      //   peek(() => {
      //     doComplexLogic();
      //   });
      // });
    </script>

    <div id="element">
      <the-parent value="10">
        <section>
          <the-child expected="10"></the-child>
        </section>
      </the-parent>
    </div>
    <script type="module">
      import { element, html, state, when, memo, $provide, $use, $setup, $debug } from "../dist/index.js";

      function Store({ initialValue = 0 }) {
        const [value, setValue] = state(initialValue);
        return { value, setValue };
      }

      element({
        tag: "the-parent",
        attributes: [["value", (n) => Number(n ?? 0)]],
        view({ attributes, children }) {
          const { value, setValue } = $provide(Store, { initialValue: attributes.value() });

          const debug = $debug();

          $setup(() => {
            const interval = setInterval(() => {
              setValue((current) => current + 1);
              debug.info("incremented", value());
            }, 1000);

            return () => clearInterval(interval);
          });

          // The HTMLElement instance can be accessed on `this`.
          debug.log({ attributes, children, self: this });

          // Children will always be a `<slot>`
          return html`<div>${children}</div>`;
        },
      });

      element({
        tag: "the-child",
        view() {
          const { value } = $use(Store);
          return html`<p>Counter: ${value}</p>`;
        },
      });
    </script>

    <script type="module">
      import { createRoot, createVirtualList, state, html, when, watch } from "../dist/index.js";

      function ChatWireDemo() {
        let nextId = 0;

        // 1. Upgrade data to objects
        const items = state([
          { id: nextId++, type: "header", text: "Today" },
          { id: nextId++, type: "message", text: "Welcome to Chat/Wire!" },
          { id: nextId++, type: "message", text: "Virtual list initialization complete." },
        ]);

        let counter = 1;

        function addMessage() {
          items.update((arr) => {
            const newArr = [...arr];

            // Auto-insert a new header every 5 messages to test the push effect
            if (counter % 5 === 0) {
              newArr.push({ id: nextId++, type: "header", text: `Update Batch ${counter / 5}` });
            }

            newArr.push({
              id: nextId++,
              type: "message",
              text: `Incoming message ${counter++} at ${new Date().toLocaleTimeString()}`,
            });

            return newArr;
          });
        }

        let i = 0;
        while (i < 200) {
          i++;
          addMessage();
        }

        setInterval(() => {
          addMessage();
        }, 5000);

        const [MessageList, listApi] = createVirtualList({
          items,
          keyFn: (item) => item.id,
          bottomUp: true,
          enterAnimationMs: 400,
          onEndReached: () => {
            console.log("WE ARE AT THE BOTTOM");
          },
          isSticky: (item) => item.type === "header",
          renderSticky: (itemSignal) => html`
            <div
              style="padding: 12px 0; width: 100%; display: flex; justify-content: center; cursor: pointer;"
              onclick=${() => listApi.scrollToItem(itemSignal.track(), { smooth: true })}
            >
              <div class="sticky-header">${() => itemSignal.track()?.text}</div>
            </div>
          `,
          render: (itemSignal, indexSignal, context) => html`
            <div style="padding: 2px 0;">
              ${() => {
                const item = itemSignal.track();
                if (!item) return null;

                if (item.type === "header") {
                  return html`
                    <div
                      style="padding: 12px 0; display: flex; justify-content: center; cursor: pointer;"
                      onclick=${() => listApi.scrollToItem(item, { smooth: true })}
                    >
                      <div class="sticky-header">${item.text}</div>
                    </div>
                  `;
                }

                return html`
                  <div class=${() => (context.isEntering.track() ? "chat-bubble animate-enter" : "chat-bubble")}>
                    ${item.text}
                  </div>
                `;
              }}
            </div>
          `,
        });

        return html`
          <div style="flex: 1; position: relative; display: flex; flex-direction: column; overflow-y: auto;">
            ${when(
              listApi.isAtBottom,
              null,
              html`
                <button
                  onclick=${() => listApi.scrollToBottom(true)}
                  style="position: absolute; bottom: 16px; right: 16px; z-index: 20; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.9); border: 1px solid #a3b8cb; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; color: #2c3e50;"
                >
                  ↓ Jump to Bottom
                </button>
              `,
            )}

            <${MessageList} />
          </div>
        `;
      }

      createRoot("#chat-wire-demo").mount(ChatWireDemo);
    </script> -->
