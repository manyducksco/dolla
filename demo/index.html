<!doctype html>
<html>
  <head>
    <title>Dolla Demo</title>
  </head>
  <body>
    <div id="counter"></div>
    <script type="module">
      import { createRoot, state, html, onMount, onCleanup, onEffect, useDebug } from "../dist/index.js";

      function Counter() {
        const count = state(0);

        // Debug uses name from context which is the function's name by default.
        const console = useDebug(this);

        onMount(this, () => {
          console.log("WE ARE MOUNTED", this);
        });

        onCleanup(this, () => {
          console.log("WE ARE UNMOUNTED");
        });

        // What are all the tracking contexts?
        // - effect() callback
        // - memo() callback
        // - any markup element attribute or child (except event handlers)

        onEffect(this, () => {
          console.log("count is", count());
        });

        return html`
          <p>Count: ${count}</p>
          <button onclick=${() => count((c) => c + 1)}>+1</button>
          <button onclick=${() => count((c) => c - 1)}>-1</button>
          <button onclick=${() => count(0)}>Reset</button>
        `;
      }

      createRoot("#counter").mount(Counter);
    </script>

    <div id="providers"></div>
    <script type="module">
      import { createRoot, state, html, addStore, useStore, when } from "../dist/index.js";

      function Store() {
        const value = state(0);
        return { value: () => value(), setValue: value };
      }

      function Parent(props, ctx) {
        const { setValue } = addStore(ctx, Store);

        setValue(10);

        // return ["div", [Child]];

        return html`
          <div>
            <${Child} />
          </div>
        `;
      }

      function Child() {
        const { value } = useStore(this, Store);

        // return ["p", ["@if", () => value() === 10, "We're good", "Something is off"]];

        return html` <p>${when(() => value() === 10, "We're good", "Something is off")}</p> `;
      }

      createRoot("#providers").mount(Parent);
    </script>

    <div id="inherited-state"></div>
    <script type="module">
      import { createRoot, state, html, onMount } from "../dist/index.js";

      function Parent() {
        this.count = state(0); // set count on context

        onMount(this, () => {
          const interval = setInterval(() => {
            this.count((current) => current + 1);
          }, 1000);

          return () => clearInterval(interval);
        });

        return html`
          <div>
            <${Child} />
          </div>
        `;
      }

      function Child() {
        const count = this.count; // get count from context

        return html`
          <p>Count from context: ${count}</p>

          <button onClick=${() => count(0)}>Reset</button>
        `;
      }

      createRoot("#inherited-state").mount(Parent);
    </script>

    <div id="stores-and-injection"></div>
    <script type="module">
      import { createRoot, state, html, addStore, useStore, onMount, onCleanup } from "../dist/index.js";

      function CounterStore() {
        const count = state(0);

        return {
          // Read-only count
          count: () => count(),
          increment: () => count((c) => c + 1),
          reset: () => count(0),
        };
      }

      function Parent() {
        const { increment } = addStore(this, CounterStore);

        onMount(this, () => {
          const interval = setInterval(increment, 1000);

          onCleanup(this, () => {
            clearInterval(interval);
          });
        });

        return html`
          <div>
            <${Child} />
          </div>
        `;
      }

      function Child() {
        const { count, reset } = useStore(this, CounterStore);

        return html`
          <p>Count from CounterStore: ${count}</p>

          <button onClick=${reset}>Reset</button>
        `;
      }

      createRoot("#stores-and-injection").mount(Parent);
    </script>

    <div id="web-components">
      <app-counter id="counter-component" count="12"></app-counter>
      <button id="randomize-button">Randomize</button>
    </div>
    <script type="module">
      import { html, state, createRoot } from "../dist/index.js";

      // Simple web components usage.
      class CounterElement extends HTMLElement {
        static observedAttributes = ["count"];

        count = state(0);

        constructor() {
          super();
          this.root = createRoot(this.attachShadow({ mode: "open" }));
        }

        connectedCallback() {
          // TODO: Allow mounting an `html` block with multiple root nodes.
          // I had to wrap them in a div to get them to show up.
          this.root.mount(html`
            <div>
              <p>Element count: ${this.count}</p>
              <button onclick=${() => this.count((current) => current + 1)}>Increment</button>
              <button onclick=${() => this.count((current) => current - 1)}>Decrement</button>
              <button onclick=${() => this.count(0)}>Reset</button>
            </div>
          `);
        }

        disconnectedCallback() {
          this.root.unmount();
        }

        attributeChangedCallback(name, oldValue, newValue) {
          if (name === "count") {
            const parsed = Number(newValue);
            if (!isNaN(parsed)) {
              this.count(parsed);
            }
          }
        }
      }

      customElements.define("app-counter", CounterElement);

      document.getElementById("randomize-button").addEventListener("click", () => {
        document.getElementById("counter-component").setAttribute("count", String(Math.round(Math.random() * 500)));
      });
    </script>

    <div id="sibling-lists"></div>
    <script type="module">
      import { createRoot, memo, state, html, each, when, onMount, onCleanup } from "../dist/index.js";

      function shuffled(source) {
        const array = [...source];
        let currentIndex = array.length;

        // While there remain elements to shuffle...
        while (currentIndex != 0) {
          // Pick a remaining element...
          let randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;

          // And swap it with the current element.
          [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }

        return array;
      }

      function List({ color, items }) {
        const sorted = state([...items]);

        function randomize() {
          sorted(shuffled);
        }

        const visible = state(false);

        onMount(this, () => {
          const interval = setInterval(randomize, 1000 + (Math.random() * 600 - 300));
          onCleanup(this, () => clearInterval(interval));
        });

        return each(
          sorted,
          (item) => item,
          (item) => {
            return html`
              <div style=${{ color: color }}>${item} ${when(visible, html`<input type="text"></input>`)}</div>
            `;
          },
        );
      }

      function SiblingLists() {
        const lists = state([
          html`<${List} color="red" items=${["broccoli", "zucchini", "radish"]} />`,
          html`<${List} color="blue" items=${["salami", "bacon", "turkey"]} />`,
          html`<${List} color="green" items=${["water", "tea", "coffee"]} />`,
        ]);

        function randomize() {
          lists(shuffled);
        }

        onMount(this, () => {
          const interval = setInterval(randomize, 2000 + (Math.random() * 600 - 300));
          onCleanup(this, () => clearInterval(interval));
        });

        return html`
          <div>
            ${lists}
            ${each(
              lists,
              (item) => item.props.color,
              (item) => item,
            )}
          </div>
        `;

        // return html`
        //   <${List} color="red" items=${["broccoli", "zucchini", "radish"]} />
        //   <${List} color="blue" items=${["salami", "bacon", "turkey"]} />
        //   <${List} color="green" items=${["water", "tea", "coffee"]} />
        // `;
      }

      createRoot("#sibling-lists").mount(SiblingLists);
    </script>

    <div
      id="chat-wire-demo"
      style="
        width: 400px;
        height: 600px;
        border: 1px solid #8ba3b5;
        border-radius: 8px;
        background: #e8ecef;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 40px;
      "
    ></div>

    <style>
      /* The dimensional bubble styling */
      .chat-bubble {
        margin: 8px 16px;
        padding: 12px 18px;
        background: linear-gradient(to bottom, #f2fcff, #d8ebf8);
        border: 1px solid #a3b8cb;
        border-radius: 16px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 2px 4px rgba(0, 0, 0, 0.15);
        font-family: sans-serif;
        color: #2c3e50;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      /* Skeuomorphic Sticky Header */
      .sticky-header {
        background: linear-gradient(to bottom, rgba(179, 198, 211, 0.85) 0%, rgba(144, 164, 180, 0.85) 100%);
        border-top: 1px solid rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid #73899b;
        border-radius: 16px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        padding: 4px 14px;
        font-family: sans-serif;
        font-size: 0.85em;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.3);
        margin: 0 auto;
        width: fit-content;
      }

      .animate-enter {
        animation: slideInAndBounce 400ms cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes slideInAndBounce {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.9);
        }
        70% {
          transform: translateY(-4px) scale(1.02);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>

    <script type="module">
      import { createRoot, state, html, when, onEffect, batch } from "../dist/index.js";
      import { createVirtualList } from "../dist/virtual.js";

      function ChatWireDemo() {
        let nextId = 0;

        // 1. Upgrade data to objects
        const items = state([
          { id: nextId++, type: "header", text: "Today" },
          { id: nextId++, type: "message", text: "Welcome to Chat/Wire!" },
          { id: nextId++, type: "message", text: "Virtual list initialization complete." },
        ]);

        let counter = 1;

        function addMessage() {
          items((arr) => {
            const newArr = [...arr];

            // Auto-insert a new header every 5 messages to test the push effect
            if (counter % 5 === 0) {
              newArr.push({ id: nextId++, type: "header", text: `Update Batch ${counter / 5}` });
            }

            newArr.push({
              id: nextId++,
              type: "message",
              text: `Incoming message ${counter++} at ${new Date().toLocaleTimeString()}`,
            });

            return newArr;
          });
        }

        batch(() => {
          let i = 0;
          while (i < 200) {
            i++;
            addMessage();
          }
        });

        setInterval(() => {
          addMessage();
        }, 5000);

        onEffect(this, () => {
          console.log("length", items().length);
        });

        const [MessageList, listApi] = createVirtualList({
          items,
          keyFn: (item) => item.id,
          bottomUp: true,
          enterAnimationMs: 400,
          onEndReached: () => {
            console.log("WE ARE AT THE BOTTOM");
          },
          isSticky: (item) => item.type === "header",
          renderSticky: (itemSignal) => html`
            <div
              style="padding: 12px 0; width: 100%; display: flex; justify-content: center; cursor: pointer;"
              onclick=${() => listApi.scrollToItem(itemSignal(), { smooth: true })}
            >
              <div class="sticky-header">${() => itemSignal()?.text}</div>
            </div>
          `,
          render: (itemSignal, indexSignal, context) => html`
            <div style="padding: 2px 0;">
              ${() => {
                const item = itemSignal();
                if (!item) return null;

                if (item.type === "header") {
                  return html`
                    <div
                      style="padding: 12px 0; display: flex; justify-content: center; cursor: pointer;"
                      onclick=${() => listApi.scrollToItem(item, { smooth: true })}
                    >
                      <div class="sticky-header">${item.text}</div>
                    </div>
                  `;
                }

                return html`
                  <div class=${() => (context.isEntering() ? "chat-bubble animate-enter" : "chat-bubble")}>
                    ${item.text}
                  </div>
                `;
              }}
            </div>
          `,
        });

        return html`
          <div style="flex: 1; position: relative; display: flex; flex-direction: column; overflow-y: auto;">
            ${when(
              listApi.isAtBottom,
              null,
              html`
                <button
                  onclick=${() => listApi.scrollToBottom(true)}
                  style="position: absolute; bottom: 16px; right: 16px; z-index: 20; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.9); border: 1px solid #a3b8cb; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; color: #2c3e50;"
                >
                  ↓ Jump to Bottom
                </button>
              `,
            )}

            <${MessageList} />
          </div>
        `;
      }

      createRoot("#chat-wire-demo").mount(ChatWireDemo);
    </script>
